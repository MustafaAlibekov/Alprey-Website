<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limbus Company Telegram Mini App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #2e1a2e;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #ffcc00;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        p {
            font-size: 1.1em;
            line-height: 1.6;
            color: #cccccc;
        }
        .logo-placeholder {
            margin-top: 30px;
            font-size: 1.5em;
            color: #999999;
            border: 2px dashed #999999;
            padding: 20px;
            border-radius: 10px;
        }
        .button {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background-color: #ff6600;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.1em;
            transition: background-color 0.3s ease;
        }
        .button:hover {
            background-color: #e65c00;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Добро пожаловать в Limbus Company!</h1>
        <p>Это ваше мини-приложение Telegram, посвященное миру Limbus Company. Здесь вы можете найти информацию, новости или даже начать небольшую интерактивную сессию.</p>
        <div class="logo-placeholder">
            <!-- Здесь можно будет разместить логотип Limbus Company или другие изображения -->
            <p>Место для контента Limbus Company</p>
        </div>
        <a href="#" class="button">Начать приключение</a>
    </div>
    <script>
        // Здесь может быть JavaScript для взаимодействия с Telegram Web App API
        // Например, для закрытия мини-приложения или отправки данных
        // if (window.Telegram && window.Telegram.WebApp) {
        //     Telegram.WebApp.ready();
        //     // Пример кнопки, которая закроет мини-приложение
        //     // document.querySelector('.button').addEventListener('click', () => {
        //     //     Telegram.WebApp.close();
        //     // });
        // }
    </script>
</body>
</html>
